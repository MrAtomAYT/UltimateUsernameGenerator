<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body { 
            background-color: #000000; 
            color: #00FF00; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }
        h2 { margin-bottom: 25px; }
        
        #googleLoginBtn { 
            padding: 12px 30px; 
            font-size: 16px; 
            cursor: pointer; 
            background-color: #00FF00; 
            color: #000000; 
            border: none; 
            border-radius: 25px; 
            font-weight: bold;
            transition: 0.3s;
        }
        #googleLoginBtn:hover { background-color: #00CC00; }
        #googleLoginBtn:disabled { background-color: #555; cursor: not-allowed; }
        
        .nav-link { color: #00FF00; text-decoration: none; font-weight: bold; position: absolute; top: 20px; right: 20px; }
    </style>
</head>
<body>

<a href="index.html" class="nav-link">Home</a>

<h2>Sign in to your account</h2>
<button id="googleLoginBtn">Login with Google</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7ChqUvspHot4kXgR2-XCb9jT5EGeKdpo",
        authDomain: "generetor-2a4bb.firebaseapp.com",
        projectId: "generetor-2a4bb",
        storageBucket: "generetor-2a4bb.firebasestorage.app",
        messagingSenderId: "316415667198",
        appId: "1:316415667198:web:919c262777b546ed23eeaf",
        measurementId: "G-N6B0929J25"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();
    const provider = new GoogleAuthProvider();
    const btn = document.getElementById('googleLoginBtn');

    btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.innerText = "Logging in...";

        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;

            // Automatically save user email to Firestore
            await setDoc(doc(db, "users", user.uid), {
                email: user.email,
                displayName: user.displayName,
                lastLogin: new Date().toISOString()
            });

            window.location.href = "index.html";
        } catch (error) {
            alert("Login Failed: " + error.message);
            btn.disabled = false;
            btn.innerText = "Login with Google";
        }
    });
</script>
</body>
</html>
